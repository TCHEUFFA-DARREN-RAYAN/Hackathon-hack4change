<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — CommonGround</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="background:var(--color-surface);">

<div class="login-split">

    <!-- Left panel: form -->
    <div class="login-panel">
        <div class="login-inner">

            <!-- Brand -->
            <div class="login-brand">
                <img src="/assets/images/logo.png" alt="CommonGround logo" class="login-brand-logo">
                <span class="login-brand-name">Common Ground</span>
            </div>

            <!-- Heading -->
            <div class="login-heading">
                <h1>Welcome!</h1>
                <p>Sign in by entering the information below</p>
            </div>

            <!-- Error notice -->
            <div id="login-error" class="login-error-notice"></div>

            <!-- Form -->
            <form id="login-form" class="login-form" onsubmit="handleLogin(event)" novalidate>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control"
                           autocomplete="email" placeholder="email@example.com" required>
                    <span class="form-error" id="err-email">Please enter a valid email address.</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control"
                           autocomplete="current-password" placeholder="••••••••••••" required>
                    <span class="form-error" id="err-password">Please enter your password.</span>
                </div>

                <label class="login-remember">
                    <input type="checkbox" id="remember-me">
                    Remember Me
                </label>

                <button type="submit" class="login-btn" id="login-btn">
                    <span class="spinner"></span>
                    <span class="btn-text">Continue</span>
                </button>

            </form>

        </div>
    </div>

    <!-- Right panel: purple gradient + logo -->
    <div class="login-right">
        <div class="login-right-dots"></div>
        <img src="/assets/images/logo.png" alt="CommonGround" class="login-right-logo">
        <p class="login-right-tagline">CommonGround</p>
        <p class="login-right-sub">Donation Coordination Network</p>
    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
    (async function () {
        try {
            const res = await auth.me();
            if (res.data) redirectAfterLogin(res.data);
        } catch {}
    })();

    function redirectAfterLogin(user) {
        const next = new URLSearchParams(window.location.search).get('next');
        if (next && (next.startsWith('/staff') || next.startsWith('/coordinator'))) {
            window.location.href = next;
        } else if (user.isAdmin) {
            window.location.href = '/coordinator';
        } else {
            window.location.href = '/staff';
        }
    }

    async function handleLogin(e) {
        e.preventDefault();

        const emailEl  = document.getElementById('email');
        const passEl   = document.getElementById('password');
        const errEl    = document.getElementById('login-error');
        const btn      = document.getElementById('login-btn');

        let valid = true;

        const emailOk = emailEl.value.trim() && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim());
        if (!emailOk) {
            emailEl.classList.add('error');
            document.getElementById('err-email').classList.add('visible');
            valid = false;
        } else {
            emailEl.classList.remove('error');
            document.getElementById('err-email').classList.remove('visible');
        }

        if (!passEl.value) {
            passEl.classList.add('error');
            document.getElementById('err-password').classList.add('visible');
            valid = false;
        } else {
            passEl.classList.remove('error');
            document.getElementById('err-password').classList.remove('visible');
        }

        if (!valid) return;

        btn.disabled = true;
        btn.classList.add('loading');
        errEl.classList.remove('visible');

        try {
            const res = await auth.login(emailEl.value.trim(), passEl.value);
            redirectAfterLogin(res.data);
        } catch (err) {
            errEl.textContent = err.message || 'Sign in failed. Please check your email and password.';
            errEl.classList.add('visible');
            passEl.value = '';
        } finally {
            btn.disabled = false;
            btn.classList.remove('loading');
        }
    }
</script>

</body>
</html>
